kind = "web"
previewPath = "/"
title = "Formu"
version = "1.0.0"
id = "artifacts/formu"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21848

[services.development]
run = "pnpm --filter @workspace/formu run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/formu", "run", "build" ]
publicDir = "artifacts/formu/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21848"
BASE_PATH = "/"
